<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: serif;
  color: gold;
}

/* 🖼️ HERO BACKGROUND */
.hero {
  position: fixed;
  width: 100%;
  height: 100%;
  background: 
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.95)),
    url('https://images.unsplash.com/photo-1587613752236-5f0c5c1b8c1d'); /* change image */
  background-size: cover;
  background-position: center;
}

/* 💎 TEXT */
.text {
  position: absolute;
  top: 30%;
  width: 100%;
  text-align: center;
  animation: fade 2s ease forwards;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(60px); }
  to { opacity: 1; transform: translateY(0); }
}

.arabic {
  font-size: 46px;
  text-shadow: 0 0 20px gold, 0 0 50px gold;
}

.english {
  font-size: 38px;
  margin-top: 10px;
  font-style: italic;
  background: linear-gradient(90deg, gold, white, gold);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.dua {
  margin-top: 20px;
  font-size: 15px;
  padding: 0 25px;
  color: #ddd;
  line-height: 1.7;
}

.from {
  margin-top: 15px;
  font-size: 16px;
  letter-spacing: 3px;
  text-shadow: 0 0 10px gold;
}

/* ✨ GOLD PARTICLES */
.particle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: gold;
  border-radius: 50%;
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="hero"></div>

<div class="text">
  <div class="arabic">عِيد مُبَارَك</div>
  <div class="english">Eid Mubarak</div>

  <div class="dua">
    Taqabbal Allahu minna wa minkum صالح الأعمال 🤍<br><br>
    May Allah accept our prayers, forgive our sins,<br>
    and fill our lives with noor, barakah and peace ✨
  </div>

  <div class="from">— SHABAZ & FAMILY —</div>
</div>

<!-- 🎵 YOUR MUSIC -->
<audio autoplay loop>
  <source src="YOUR-MUSIC.mp3" type="audio/mpeg">
</audio>

<script>

/* ✨ particles */
for(let i=0;i<40;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(4+Math.random()*4)+"s";
  document.body.appendChild(p);
}

</script>

</body>
</html>
