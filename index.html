<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #000000;
  font-family: 'Georgia', serif;
  color: gold;
}

/* 🌌 Particle Canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* 🌙 3D Moon Effect */
.moon {
  position: absolute;
  top: 8%;
  left: 50%;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #fff8dc, gold 40%, transparent 70%);
  box-shadow: -35px 0 0 8px rgba(255,215,0,0.9),
              0 0 40px gold,
              0 0 80px rgba(255,215,0,0.5);
  transform: translateX(-50%) rotate(-20deg);
}

/* 🏮 Lantern */
.lantern {
  position: absolute;
  top: -60px;
  width: 40px;
  height: 60px;
  background: linear-gradient(gold, #ffcc00);
  border-radius: 10px;
  box-shadow: 0 0 40px gold;
  animation: swing 4s infinite ease-in-out;
}

@keyframes swing {
  0% { transform: rotate(-12deg); }
  50% { transform: rotate(12deg); }
  100% { transform: rotate(-12deg); }
}

/* 💎 TEXT */
.text {
  position: absolute;
  top: 30%;
  width: 100%;
  text-align: center;
  animation: fade 2s ease forwards;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(60px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ✨ Arabic Calligraphy Glow */
.arabic {
  font-size: 46px;
  font-weight: bold;
  text-shadow:
    0 0 10px gold,
    0 0 20px gold,
    0 0 40px gold,
    0 0 80px rgba(255,215,0,0.8);
}

/* 💎 English Calligraphy */
.english {
  font-size: 38px;
  margin-top: 10px;
  font-style: italic;
  background: linear-gradient(90deg, gold, white, gold);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 20px gold;
}

/* 📝 Dua */
.dua {
  margin-top: 20px;
  font-size: 15px;
  padding: 0 25px;
  color: #ccc;
  line-height: 1.7;
}

/* 👑 From */
.from {
  margin-top: 15px;
  font-size: 16px;
  letter-spacing: 3px;
  text-shadow: 0 0 10px gold;
}

/* ✨ Spark */
.spark {
  position: absolute;
  width: 6px;
  height: 6px;
  background: gold;
  border-radius: 50%;
  animation: explode 1s forwards;
}

@keyframes explode {
  to {
    transform: scale(6) translateY(-60px);
    opacity: 0;
  }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="moon"></div>
<div class="lantern" style="left:12%"></div>
<div class="lantern" style="left:85%"></div>

<div class="text">
  <div class="arabic">عِيد مُبَارَك</div>
  <div class="english">Eid Mubarak</div>

  <div class="dua">
    Taqabbal Allahu minna wa minkum صالح الأعمال 🤍<br><br>
    May Allah accept our prayers, forgive our sins,<br>
    and fill our lives with noor, barakah and peace ✨
  </div>

  <div class="from">— SHABAZ & FAMILY —</div>
</div>

<script>

/* 🌌 GOLD PARTICLE SYSTEM */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<150;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    d: Math.random()*1.2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="gold";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });

  update();
}

function update(){
  particles.forEach(p=>{
    p.y += p.d;
    if(p.y > canvas.height){
      p.y = 0;
      p.x = Math.random()*canvas.width;
    }
  });
}

setInterval(draw,30);

/* ✨ Tap Spark */
document.addEventListener("click", e=>{
  let s=document.createElement("div");
  s.className="spark";
  s.style.left=e.clientX+"px";
  s.style.top=e.clientY+"px";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),1000);
});

</script>

</body>
</html>
