<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #000000 40%, #020202 100%);
  font-family: 'Georgia', serif;
  color: gold;
}

/* 🌌 Canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* 🌙 Crescent */
.moon {
  position: absolute;
  top: 8%;
  left: 50%;
  width: 110px;
  height: 110px;
  border-radius: 50%;
  box-shadow: -30px 0 0 6px gold;
  transform: translateX(-50%);
}

/* 🏮 Lantern */
.lantern {
  position: absolute;
  top: -60px;
  width: 40px;
  height: 60px;
  background: linear-gradient(gold, #ffcc00);
  border-radius: 10px;
  box-shadow: 0 0 30px gold;
  animation: swing 4s infinite ease-in-out;
}

@keyframes swing {
  0% { transform: rotate(-12deg); }
  50% { transform: rotate(12deg); }
  100% { transform: rotate(-12deg); }
}

/* 💎 Text block */
.text {
  position: absolute;
  top: 32%;
  width: 100%;
  text-align: center;
  opacity: 0;
  animation: fadeUp 2.5s forwards 1s;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(60px); }
  to { opacity: 1; transform: translateY(0); }
}

.arabic {
  font-size: 42px;
  text-shadow: 0 0 20px gold, 0 0 40px gold;
}

.english {
  font-size: 34px;
  margin-top: 10px;
  background: linear-gradient(90deg, gold, white, gold);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.dua {
  margin-top: 20px;
  font-size: 15px;
  padding: 0 20px;
  line-height: 1.6;
  color: #ddd;
}

.from {
  margin-top: 15px;
  font-size: 16px;
  letter-spacing: 2px;
}

/* ✨ Spark */
.spark {
  position: absolute;
  width: 6px;
  height: 6px;
  background: gold;
  border-radius: 50%;
  animation: explode 1s forwards;
}

@keyframes explode {
  to {
    transform: scale(5) translateY(-50px);
    opacity: 0;
  }
}

/* 🎵 Button */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: gold;
  border-radius: 50%;
  width: 55px;
  height: 55px;
  font-size: 20px;
  border: none;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="moon"></div>
<div class="lantern" style="left:10%"></div>
<div class="lantern" style="left:85%"></div>

<div class="text">
  <div class="arabic">عِيد مُبَارَك</div>
  <div class="english">EID MUBARAK</div>

  <div class="dua">
    Taqabbal Allahu minna wa minkum صالح الأعمال 🤍<br><br>
    May Allah accept our prayers, forgive our sins,  
    and fill our hearts with peace, noor and barakah ✨<br><br>
    May this Eid bring happiness, prosperity  
    and endless blessings into your life 🌙
  </div>

  <div class="from">— SHABAZ & FAMILY —</div>
</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_6c1c9a9f4b.mp3" type="audio/mpeg">
</audio>

<script>

/* 🌌 Particle background */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let p = [];
for(let i=0;i<120;i++){
  p.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    d: Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="gold";
  p.forEach(i=>{
    ctx.beginPath();
    ctx.arc(i.x,i.y,i.r,0,Math.PI*2);
    ctx.fill();
  });
  update();
}

function update(){
  p.forEach(i=>{
    i.y+=i.d;
    if(i.y>canvas.height){
      i.y=0;
      i.x=Math.random()*canvas.width;
    }
  });
}

setInterval(draw,30);

/* ✨ Tap spark */
document.addEventListener("click", e=>{
  let s=document.createElement("div");
  s.className="spark";
  s.style.left=e.clientX+"px";
  s.style.top=e.clientY+"px";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),1000);
});

/* 🎵 Music */
let music=document.getElementById("bgMusic");
function toggleMusic(){
  music.paused ? music.play() : music.pause();
}

</script>

</body>
</html>
