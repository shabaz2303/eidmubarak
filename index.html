<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Georgia', serif;
  color: gold;
}

/* 🖼️ BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -2;
  background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.95)),
    url('herobg.jpg');
  background-size: cover;
  background-position: center;
}

/* 🌙 MOON */
.moon {
  position: absolute;
  top: 4%;
  left: 50%;
  width: 85px;
  transform: translateX(-50%);
  z-index: 1;
  filter: drop-shadow(0 0 25px gold);
}

/* 💎 GLASS CARD */
.glass {
  position: absolute;
  top: 20%; /* PUSHED DOWN = NO OVERLAP */
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 420px;
  padding: 20px;

  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 0 40px rgba(255,215,0,0.2);

  z-index: 2;
  text-align: center;
}

/* ✨ COMMON ANIMATION */
.line, .arabic, .final, .from {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 1s forwards;
}

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

/* 💎 DIAMOND */
.diamond {
  position: relative;
  display: inline-block;
  overflow: hidden;
}

.diamond::after {
  content: "";
  position: absolute;
  top: 0;
  left: -75%;
  width: 50%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.9), transparent);
  transform: skewX(-20deg);
  animation: shine 4s infinite;
}

@keyframes shine {
  0% { left: -75%; }
  100% { left: 125%; }
}

/* TEXT */
.main {
  font-size: 28px;
  text-shadow: 0 0 20px gold, 0 0 60px gold;
}

.sub {
  font-size: 22px;
}

.line {
  font-size: 14px;
  margin-top: 10px;
  color: #ddd;
}

.small {
  font-size: 16px;
}

.final {
  margin-top: 15px;
  font-size: 18px;
}

.from {
  margin-top: 15px;
  font-size: 14px;
  letter-spacing: 2px;
}

/* ⏱️ SYNC */
.main { animation-delay: 0.5s; }
.sub { animation-delay: 1.5s; }
.l1 { animation-delay: 2.5s; }
.l2 { animation-delay: 3.5s; }
.l3 { animation-delay: 4.5s; }
.l4 { animation-delay: 5.5s; }
.l5 { animation-delay: 6.5s; }
.l6 { animation-delay: 7.5s; }
.l7 { animation-delay: 8.5s; }
.final { animation-delay: 9.5s; }
.from { animation-delay: 10.5s; }

/* ✨ PARTICLES */
.particle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: gold;
  border-radius: 50%;
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); opacity: 0; }
}

/* 💥 RIPPLE */
.ripple {
  position: absolute;
  border: 2px solid gold;
  border-radius: 50%;
  animation: ripple 1s ease-out;
}

@keyframes ripple {
  from { width: 10px; height: 10px; }
  to { width: 200px; height: 200px; opacity: 0; }
}
</style>
</head>

<body onclick="startAll(event)">

<div class="bg"></div>

<img src="moon1.png" class="moon">

<div class="glass">

  <div class="arabic main diamond">👑🌙✨ 𝕰𝖎𝖉 𝑀𝓊𝒷𝒶𝓇𝒶𝓀 ✨🌙👑</div>
  <div class="arabic sub">عِيد مُبَارَك 🤍</div>

  <div class="line l1">𝓣𝓪𝓺𝓪𝓫𝓫𝓪𝓵 𝓐𝓵𝓵𝓪𝓱𝓾 𝓶𝓲𝓷𝓷𝓪</div>
  <div class="arabic small l2">تَقَبَّلَ اللَّهُ مِنَّا</div>

  <div class="line l3">May Allah accept our prayers ✨</div>
  <div class="arabic small l4">اللّهُمَّ اجْعَلْ هٰذَا الْعِيدَ فَرَحًا</div>

  <div class="line l5">Peace 🤍 Light 🌙 Prosperity 💫</div>

  <div class="line l6">𝓚𝓾𝓵𝓵𝓾 𝓪𝓪𝓶𝓲𝓷 ✨</div>
  <div class="arabic small l7">كُلُّ عَامٍ وَأَنْتُمْ بِخَيْر</div>

  <div class="final diamond">💎🌙 𝙴𝙸𝙳 𝑀𝓊𝒷𝒶𝓇𝒶𝓀 🌙💎</div>
  <div class="from">— SHABAZ & FAMILY —</div>

</div>

<audio id="music" loop>
  <source src="eidmub.mp3" type="audio/mpeg">
</audio>

<script>
function startAll(e){
  document.getElementById("music").play();

  let r=document.createElement("div");
  r.className="ripple";
  r.style.left=e.clientX+"px";
  r.style.top=e.clientY+"px";
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),1000);
}

for(let i=0;i<60;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(4+Math.random()*4)+"s";
  document.body.appendChild(p);
}
</script>

</body>
</html>
