<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Georgia', serif;
  color: gold;
}

/* 🎥 VIDEO BG */
video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.4) blur(2px);
  z-index: -2;
}

/* 🖤 OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, transparent, #000 90%);
  z-index: -1;
}

/* 🌙 MOON (PARALLAX FLOAT) */
.moon {
  position: absolute;
  top: 6%;
  left: 50%;
  width: 90px;
  transform: translateX(-50%);
  filter: drop-shadow(0 0 25px gold);
  animation: floatMoon 4s ease-in-out infinite;
}

@keyframes floatMoon {
  0% { transform: translate(-50%, 0px); }
  50% { transform: translate(-50%, 10px); }
  100% { transform: translate(-50%, 0px); }
}

/* 💎 TEXT */
.text {
  position: absolute;
  top: 28%;
  width: 100%;
  text-align: center;
}

/* ✍️ Arabic */
.arabic {
  font-size: 48px;
  text-shadow: 0 0 20px gold, 0 0 60px gold;
}

/* 💠 English glass */
.english {
  font-size: 38px;
  margin-top: 10px;
  background: linear-gradient(90deg, gold, white, gold);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ⌨️ TYPEWRITER */
.typewriter {
  margin-top: 20px;
  font-size: 15px;
  color: #ddd;
  width: 80%;
  margin-left: auto;
  margin-right: auto;
  border-right: 2px solid gold;
  white-space: nowrap;
  overflow: hidden;
}

/* 👑 FROM */
.from {
  margin-top: 25px;
  letter-spacing: 3px;
  text-shadow: 0 0 10px gold;
}

/* ✨ PARTICLES */
.particle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: gold;
  border-radius: 50%;
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); opacity: 0; }
}

/* 💥 RIPPLE */
.ripple {
  position: absolute;
  border: 2px solid gold;
  border-radius: 50%;
  animation: ripple 1s ease-out;
}

@keyframes ripple {
  from { width: 10px; height: 10px; opacity: 1; }
  to { width: 200px; height: 200px; opacity: 0; }
}
</style>
</head>

<body onclick="startAll(event)">

<video autoplay muted loop>
  <source src="hero.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<img src="moon.jpg" class="moon">

<div class="text">
  <div class="arabic">عِيد مُبَارَك</div>
  <div class="english">Eid Mubarak</div>

  <div class="typewriter" id="type"></div>

  <div class="from">— SHABAZ & FAMILY —</div>
</div>

<audio id="music" loop>
  <source src="eidmub.mp3" type="audio/mpeg">
</audio>

<script>

/* ⌨️ TYPEWRITER */
let txt = "Taqabbal Allahu minna wa minkum صالح الأعمال 🤍   May Allah fill your life with noor, barakah and peace ✨   Eid Mubarak 🌙";
let i=0;
function type(){
  if(i<txt.length){
    document.getElementById("type").innerHTML += txt.charAt(i);
    i++;
    setTimeout(type,35);
  }
}
type();

/* 🎵 START ALL */
function startAll(e){
  document.getElementById("music").play();

  /* ripple */
  let r=document.createElement("div");
  r.className="ripple";
  r.style.left=e.clientX+"px";
  r.style.top=e.clientY+"px";
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),1000);
}

/* ✨ PARTICLES */
for(let i=0;i<60;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(4+Math.random()*4)+"s";
  document.body.appendChild(p);
}

</script>

</body>
</html>
